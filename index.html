<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do You Wanna Build a Snowman</title>
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff; /* Clean white background */
            text-align: center;
            padding-top: 10vh;
            color: #4a148c; /* Deep purple text */
            overflow: hidden; /* Prevents scrollbars when the button runs away */
            margin: 0;
        }

        /* --- Envelope Styles --- */
        #envelope-wrapper {
            position: relative;
            margin: 50px auto;
            width: 320px;
            height: 200px;
            cursor: pointer;
            transition: opacity 0.5s ease;
        }

        .envelope-text {
            font-size: 24px;
            font-weight: bold;
            color: #1e88e5; /* Vibrant Blue */
            margin-bottom: 40px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .envelope {
            position: relative;
            width: 100%;
            height: 100%;
            background: #8e24aa; /* Vibrant Purple Base */
            border-radius: 0 0 10px 10px;
            box-shadow: 0 15px 40px rgba(142, 36, 170, 0.3);
        }

        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 120px solid #1e88e5; /* Vibrant Blue Flap */
            transform-origin: top;
            transition: transform 0.6s ease, z-index 0.2s;
            z-index: 4;
        }

        .envelope-front {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 160px solid #9c27b0; /* Lighter Purple Left/Right */
            border-right: 160px solid #9c27b0;
            border-bottom: 110px solid #7b1fa2; /* Darker Purple Bottom */
            border-top: 90px solid transparent;
            z-index: 3;
            border-radius: 0 0 10px 10px;
        }

        .letter-stub {
            position: absolute;
            bottom: 0;
            left: 10px;
            right: 10px;
            height: 180px;
            background: linear-gradient(145deg, #ffffff, #e3f2fd); /* White to light blue */
            z-index: 2;
            border-radius: 10px 10px 0 0;
            transition: transform 0.8s ease 0.3s; /* Waits for flap to open */
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
        }

        /* Animation classes added by JS */
        #envelope-wrapper.open .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        #envelope-wrapper.open .letter-stub {
            transform: translateY(-100px);
        }

        .fade-out {
            opacity: 0;
            pointer-events: none;
        }

        /* --- Question Form Styles --- */
        #main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            width: 100%;
        }

        .fade-in-up {
            animation: fadeInUp 0.8s ease forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .container {
            margin-bottom: 30px;
            padding: 40px;
            background: linear-gradient(145deg, #f3e5f5, #e3f2fd);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(74, 20, 140, 0.1);
            max-width: 600px;
            width: 90%;
        }

        .hidden {
            display: none !important;
        }

        .buttons {
            margin-top: 30px;
            position: relative;
        }

        button {
            padding: 12px 35px;
            font-size: 20px;
            margin: 10px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
        }

        .yes-btn {
            background-color: #1e88e5; /* Vibrant Blue */
            color: white;
            box-shadow: 0 4px 15px rgba(30, 136, 229, 0.4);
        }

        .yes-btn:hover {
            background-color: #1565c0;
            transform: scale(1.05);
        }

        .no-btn {
            background-color: #8e24aa; /* Vibrant Purple */
            color: white;
            box-shadow: 0 4px 15px rgba(142, 36, 170, 0.4);
        }

        .popup {
            display: inline-block;
            margin-top: 20px;
            padding: 40px;
            background: #ffffff;
            border: 3px solid #1e88e5;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(30, 136, 229, 0.2);
            font-size: 28px;
            font-weight: bold;
            color: #8e24aa;
        }
    </style>
</head>
<body>

    <!-- The Envelope Screen -->
    <div id="envelope-wrapper" onclick="openEnvelope()">
        <div class="envelope-text">Click to Open 💌</div>
        <div class="envelope">
            <div class="flap"></div>
            <div class="letter-stub">✉️</div>
            <div class="envelope-front"></div>
        </div>
    </div>

    <!-- The Actual Questions (Hidden until envelope opens) -->
    <div id="main-content" class="hidden">
        
        <!-- Question 1 -->
        <div class="container" id="question-1">
            <h1>Hola Senorita, Are you free tomorrow?</h1>
            <div class="buttons">
                <button class="no-btn evasive-btn" id="runaway-btn">No</button>
                <button class="yes-btn" onclick="showQuestion2()">Yes</button>
            </div>
        </div>

        <!-- Question 2 -->
        <div class="container hidden" id="question-2">
            <h1>:0 whhaa no ways me too so I'm going to watch a movie, come watch it with me.</h1>
            <div class="buttons">
                <button class="no-btn evasive-btn" id="runaway-btn-2">No</button>
                <button class="yes-btn" onclick="showPopup()">Yes</button>
            </div>
        </div>

        <!-- Final Popup -->
        <div class="popup hidden" id="popup">
            <p>Awesome, I'm glad⛄🎥🍿</p>
        </div>

    </div>

    <script>
        // --- 1. Envelope Animation Logic ---
        function openEnvelope() {
            const wrapper = document.getElementById('envelope-wrapper');
            const mainContent = document.getElementById('main-content');
            
            // 1. Open the flap and slide letter up
            wrapper.classList.add('open');
            
            // 2. Wait 1.5 seconds, then fade out the envelope
            setTimeout(() => {
                wrapper.classList.add('fade-out');
                
                // 3. After fading out, hide envelope completely and show questions
                setTimeout(() => {
                    wrapper.classList.add('hidden');
                    mainContent.classList.remove('hidden');
                    mainContent.classList.add('fade-in-up'); // Adds a bounce-up animation
                }, 500); // 500ms fade transition time

            }, 1500); // 1.5s to admire the opening animation
        }

        // --- 2. Question Transition Functions ---
        function showQuestion2() {
            document.getElementById('question-1').classList.add('hidden');
            document.getElementById('question-2').classList.remove('hidden');
        }

        function showPopup() {
            document.getElementById('question-2').classList.add('hidden');
            document.getElementById('popup').classList.remove('hidden');
            
            // Trigger Confetti!
            fireConfetti();
        }

        // --- 3. Running Away Button Logic ---
        const runawayBtns = document.querySelectorAll('.evasive-btn');

        runawayBtns.forEach(btn => {
            btn.addEventListener('mouseover', moveButton);
            btn.addEventListener('touchstart', moveButton);
        });

        function moveButton(e) {
            const btn = e.target;
            
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            
            const randomX = Math.floor(Math.random() * (windowWidth - btn.offsetWidth));
            const randomY = Math.floor(Math.random() * (windowHeight - btn.offsetHeight));
            
            btn.style.position = 'fixed';
            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
        }

        // --- 4. Confetti Logic ---
        function fireConfetti() {
            var duration = 3 * 1000; // 3 seconds
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ffffff', '#8e24aa', '#1e88e5'] // White, Purple, Blue
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ffffff', '#8e24aa', '#1e88e5']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>

</body>
</html>
